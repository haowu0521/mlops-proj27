task_name: meeting_summarization

mlflow:
  tracking_uri: "http://129.114.26.89:8000"
  experiment_name: "jitsi-summarization-v2"

data:
  dataset_name: "MeetingBank"
  train_file: ""
  val_file: ""
  test_file: ""
  text_column: "transcript"
  summary_column: "summary"
  max_train_samples: 1000
  max_val_samples: 100
  max_test_samples: 100

model:
  model_name: "google/flan-t5-base"
  max_input_length: 1024
  max_target_length: 128

train:
  output_dir: "./outputs"
  num_train_epochs: 1
  learning_rate: 5e-5
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 2
  weight_decay: 0.01
  logging_steps: 10
  eval_strategy: "epoch"
  save_strategy: "epoch"
  seed: 42

run:
  candidate_name: "v2"
  
