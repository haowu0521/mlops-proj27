# ---------------------------------------------------------------------------
# jibri.yaml — Jitsi Broadcasting Infrastructure (meeting recording)
#
# Runs privileged to access /dev/snd (snd-aloop audio loopback).
# Records to /config/recordings (emptyDir), finalize.sh uploads to MinIO
# recordings bucket then cleans up.
#
# `mc` (MinIO client) is provided by an initContainer that copies the
# pre-built binary from the official `minio/mc` image into a shared
# emptyDir mounted at /opt/bin in the jibri container. This avoids the
# previous fragile pattern of curl-downloading mc at recording-finalize
# time (which silently failed on transient network errors and left
# recordings stuck in /config/recordings).
#
# finalize.sh layout in MinIO:
#   recordings/<jibri_session_id>/metadata.json
#   recordings/<jibri_session_id>/<roomname>_<datetime>.mp4
# Using jibri's session_id (the directory jibri itself created under
# /config/recordings/) as the MinIO key prefix gives us a strong
# 1-to-many group key: mp4 + metadata.json always travel together,
# the prefix is traceable back to the jibri log line that produced
# the recording, and listing one folder gives the entire artifact set
# for one meeting.
#
# After upload finalize.sh notifies data-api by POSTing /meetings,
# which inserts a row with audio_object_key set and asr_status =
# 'not_requested'. handoff_asr_jobs.py picks it up from there.
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: jibri-finalize
  namespace: jitsi
data:
  finalize.sh: |
    #!/bin/bash
    # $1 = path to recording directory, e.g. /config/recordings/<jibri_session_id>
    #
    # Two responsibilities:
    #   1. Upload the recording folder to MinIO under recordings/<session_id>/
    #      so mp4 + metadata.json stay grouped under a stable, traceable key.
    #   2. POST a meetings row to data-api with audio_object_key pointing at
    #      the mp4. This is the trigger that makes the meeting eligible for
    #      ASR (handoff_asr_jobs.py claims rows with asr_status='not_requested'
    #      and audio_object_key IS NOT NULL).
    set -eu
    RECORDING_DIR="$1"
    SESSION_ID=$(basename "$RECORDING_DIR")

    echo "[finalize] session=$SESSION_ID dir=$RECORDING_DIR"

    MC=/opt/bin/mc
    $MC alias set platform \
      http://minio.platform.svc.cluster.local:9000 \
      minio minio123

    # Upload the whole directory in one call so mp4 + metadata.json land
    # atomically under recordings/<session_id>/ with their original names.
    $MC cp --recursive "$RECORDING_DIR/" "platform/recordings/${SESSION_ID}/"
    echo "[finalize] uploaded session $SESSION_ID to platform/recordings/${SESSION_ID}/"

    # Find the media file we just uploaded so we can pass its object key to
    # data-api. Jibri usually writes mp4, but accept common alternatives so
    # the API handoff does not silently skip if the container changes format.
    MEDIA_FILE=$(find "$RECORDING_DIR" -maxdepth 1 -type f \( \
      -iname '*.mp4' -o -iname '*.webm' -o -iname '*.mkv' \
    \) | head -n 1 || true)
    MEDIA_KEY=""
    if [ -n "$MEDIA_FILE" ]; then
      MEDIA_KEY="${SESSION_ID}/$(basename "$MEDIA_FILE")"
    fi

    if [ -z "$MEDIA_KEY" ]; then
      echo "[finalize] WARNING: no media file found in $RECORDING_DIR; skipping data-api notification"
    else
      STARTED_AT=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      ENDED_AT="$STARTED_AT"
      echo "[finalize] notifying data-api: audio_object_key=$MEDIA_KEY"
      #
      # status/asr_status semantics:
      #   meetings.status      = whole-pipeline state, drives the UI's
      #                          "is this meeting ready to view?" indicator
      #   meetings.asr_status  = fine-grained ASR-step state for workers
      #
      # At finalize time the recording is in MinIO but ASR + summary haven't
      # run yet, so we leave both at their schema defaults:
      #   status     = 'scheduled'        (waiting in the pipeline)
      #   asr_status = 'not_requested'    (handoff_asr_jobs.py will queue it)
      # Workers transition: scheduled -> in_progress -> completed
      #                     not_requested -> queued -> processing -> completed
      API_RESPONSE=$(mktemp)
      HTTP_CODE=$(curl -sS -o "$API_RESPONSE" -w "%{http_code}" \
        -X POST http://data-api.platform.svc.cluster.local:8000/meetings \
        -H 'Content-Type: application/json' \
        -d "{
          \"source\": \"jitsi_recording:${SESSION_ID}\",
          \"started_at\": \"${STARTED_AT}\",
          \"ended_at\": \"${ENDED_AT}\",
          \"audio_object_key\": \"${MEDIA_KEY}\",
          \"status\": \"scheduled\",
          \"asr_status\": \"not_requested\"
        }" || true)

      echo "[finalize] data-api HTTP ${HTTP_CODE}: $(cat "$API_RESPONSE")"
      if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
        echo "[finalize] WARNING: data-api notification failed; recording is in MinIO but no meeting row was created"
      fi
      rm -f "$API_RESPONSE"
    fi

    # Clean up local copy regardless of whether the API call succeeded —
    # the recording is safely in MinIO at this point and leaving it on the
    # ephemeral pod disk just risks filling /config on a busy jibri.
    rm -rf "$RECORDING_DIR"
    echo "[finalize] done."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jibri
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jibri
  template:
    metadata:
      labels:
        app: jibri
    spec:
      initContainers:
      - name: install-mc
        image: minio/mc:latest
        command: ["sh", "-c", "cp /usr/bin/mc /shared/mc && chmod +x /shared/mc"]
        volumeMounts:
        - name: shared-tools
          mountPath: /shared
      containers:
      - name: jibri
        image: jitsi/jibri:stable
        securityContext:
          privileged: true
        envFrom:
        - configMapRef:
            name: jitsi-config
        - secretRef:
            name: jitsi-secrets
        env:
        - name: DISPLAY
          value: ":0"
        - name: IGNORE_CERTIFICATE_ERRORS
          value: "1"
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: dev-snd
          mountPath: /dev/snd
        - name: recordings
          mountPath: /config/recordings
        - name: finalize
          mountPath: /config/finalize.sh
          subPath: finalize.sh
        - name: dshm
          mountPath: /dev/shm
        - name: shared-tools
          mountPath: /opt/bin
      volumes:
      - name: dev-snd
        hostPath:
          path: /dev/snd
      - name: recordings
        emptyDir: {}
      - name: finalize
        configMap:
          name: jibri-finalize
          defaultMode: 0755
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      - name: shared-tools
        emptyDir: {}
