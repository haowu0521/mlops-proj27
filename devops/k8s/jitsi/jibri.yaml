# ---------------------------------------------------------------------------
# jibri.yaml — Jitsi Broadcasting Infrastructure (meeting recording)
#
# Runs privileged to access /dev/snd (snd-aloop audio loopback).
# Records to /config/recordings (emptyDir), finalize.sh uploads to MinIO
# recordings bucket then cleans up.
#
# `mc` (MinIO client) is provided by an initContainer that copies the
# pre-built binary from the official `minio/mc` image into a shared
# emptyDir mounted at /opt/bin in the jibri container. This avoids the
# previous fragile pattern of curl-downloading mc at recording-finalize
# time (which silently failed on transient network errors and left
# recordings stuck in /config/recordings).
# ---------------------------------------------------------------------------

apiVersion: v1
kind: ConfigMap
metadata:
  name: jibri-finalize
  namespace: jitsi
data:
  finalize.sh: |
    #!/bin/bash
    # $1 = path to recording directory
    set -eu
    RECORDING_DIR="$1"
    echo "[finalize] uploading contents of $RECORDING_DIR to MinIO..."

    MC=/opt/bin/mc

    $MC alias set platform \
      http://minio.platform.svc.cluster.local:9000 \
      minio minio123

    # Upload every file under the recording dir, keep its basename
    for f in "$RECORDING_DIR"/*; do
      [ -e "$f" ] || continue
      BASENAME=$(basename "$f")
      TS=$(date +%Y%m%d-%H%M%S)
      $MC cp "$f" "platform/recordings/${TS}-${BASENAME}"
      echo "[finalize] uploaded ${TS}-${BASENAME}"
    done

    # Clean up local copy
    rm -rf "$RECORDING_DIR"
    echo "[finalize] done."
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: jibri
  namespace: jitsi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jibri
  template:
    metadata:
      labels:
        app: jibri
    spec:
      initContainers:
      - name: install-mc
        image: minio/mc:latest
        command: ["sh", "-c", "cp /usr/bin/mc /shared/mc && chmod +x /shared/mc"]
        volumeMounts:
        - name: shared-tools
          mountPath: /shared
      containers:
      - name: jibri
        image: jitsi/jibri:stable
        securityContext:
          privileged: true
        envFrom:
        - configMapRef:
            name: jitsi-config
        - secretRef:
            name: jitsi-secrets
        env:
        - name: DISPLAY
          value: ":0"
        - name: IGNORE_CERTIFICATE_ERRORS
          value: "1"
        resources:
          requests:
            cpu: "500m"
            memory: "2Gi"
          limits:
            cpu: "2000m"
            memory: "4Gi"
        volumeMounts:
        - name: dev-snd
          mountPath: /dev/snd
        - name: recordings
          mountPath: /config/recordings
        - name: finalize
          mountPath: /config/finalize.sh
          subPath: finalize.sh
        - name: dshm
          mountPath: /dev/shm
        - name: shared-tools
          mountPath: /opt/bin
      volumes:
      - name: dev-snd
        hostPath:
          path: /dev/snd
      - name: recordings
        emptyDir: {}
      - name: finalize
        configMap:
          name: jibri-finalize
          defaultMode: 0755
      - name: dshm
        emptyDir:
          medium: Memory
          sizeLimit: 2Gi
      - name: shared-tools
        emptyDir: {}
